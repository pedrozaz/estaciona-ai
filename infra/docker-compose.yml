services:
  db:
    image: postgres:15-alpine
    container_name: estaciona_db
    restart: always
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - estaciona_ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile.server
    container_name: estaciona_server
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - RUST_LOG=info

    depends_on:
      db:
        condition: service_healthy
    networks:
      - estaciona_ai

volumes:
  postgres_data:
    name: estaciona_postgres_data

networks:
  estaciona_ai:
