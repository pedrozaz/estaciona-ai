<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibração de Pinpoints - Estaciona AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: #0f1117;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Top Bar ── */
    .cal-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      background: rgba(15, 17, 23, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 100;
    }

    .cal-nav .title {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cal-nav .title .dot {
      width: 8px; height: 8px;
      background: var(--primary-green);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #94a3b8;
    }

    .btn-action:hover {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
    }

    .btn-action.primary {
      background: var(--primary-green);
      border-color: var(--primary-green);
      color: #fff;
    }

    .btn-action.primary:hover {
      background: var(--primary-dark);
    }

    .btn-action.danger {
      color: #f87171;
      border-color: rgba(220,38,38,0.2);
    }

    .btn-action.danger:hover {
      background: rgba(220,38,38,0.1);
    }

    /* ── Viewport ── */
    #viewport {
      position: fixed;
      top: 48px; left: 0; right: 300px; bottom: 0;
      cursor: crosshair;
    }

    #viewport canvas { display: block; width: 100%; height: 100%; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 48px; right: 0; bottom: 0;
      width: 300px;
      background: rgba(15, 17, 23, 0.95);
      border-left: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      z-index: 90;
    }

    .sidebar-header {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-header h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 0.25rem;
    }

    .sidebar-header p {
      font-size: 0.72rem;
      color: #64748b;
      margin: 0;
    }

    .pin-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .pin-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      margin-bottom: 0.35rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.2s;
    }

    .pin-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(28, 167, 69, 0.2);
    }

    .pin-marker {
      width: 10px; height: 10px;
      background: var(--primary-green);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(28, 167, 69, 0.4);
    }

    .pin-info {
      flex: 1;
      min-width: 0;
    }

    .pin-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #e2e8f0;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      font-family: var(--font-main);
      padding: 0;
    }

    .pin-name::placeholder {
      color: #475569;
    }

    .pin-coords {
      font-size: 0.65rem;
      color: #475569;
      font-family: monospace;
      margin-top: 2px;
    }

    .pin-delete {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .pin-delete:hover {
      color: #f87171;
    }

    .sidebar-footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .pin-count {
      font-size: 0.75rem;
      color: #64748b;
      text-align: center;
    }

    /* ── JSON Output Modal ── */
    .json-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .json-modal.active { display: flex; }

    .json-content {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.5rem;
      width: 90%;
      max-width: 550px;
      max-height: 80vh;
    }

    .json-content h3 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: #e2e8f0;
    }

    .json-content textarea {
      width: 100%;
      height: 300px;
      background: #0f1117;
      color: var(--primary-green);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      resize: none;
      outline: none;
    }

    .json-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      justify-content: flex-end;
    }

    /* ── Instructions overlay ── */
    .instructions {
      position: fixed;
      bottom: 0.75rem;
      left: 0.75rem;
      background: rgba(15, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      z-index: 60;
      font-size: 0.75rem;
      color: #64748b;
      pointer-events: none;
      max-width: calc(100% - 320px);
    }

    .instructions strong { color: #94a3b8; }

    /* ── Loading ── */
    .loading-overlay {
      position: fixed;
      top: 48px; left: 0; right: 300px; bottom: 0;
      background: #0f1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: opacity 0.6s ease;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-ring {
      width: 48px; height: 48px;
      border: 3px solid rgba(28, 167, 69, 0.15);
      border-top-color: var(--primary-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 0.9rem; color: #64748b; }
    .loading-progress { margin-top: 0.5rem; font-size: 0.8rem; color: var(--primary-green); font-weight: 600; }
  </style>
</head>

<body>
  <!-- Top Bar -->
  <nav class="cal-nav">
    <div class="title">
      <div class="dot"></div>
      Modo Calibração — Pinpoints
    </div>
    <div class="nav-actions">
      <button class="btn-action danger" onclick="clearAllPins()">Limpar Tudo</button>
      <button class="btn-action" onclick="importJSON()">Importar JSON</button>
      <button class="btn-action primary" onclick="exportJSON()">Exportar JSON</button>
    </div>
  </nav>

  <!-- 3D Viewport -->
  <div id="viewport"></div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-text">Carregando modelo 3D...</div>
    <div class="loading-progress" id="loadingProgress">0%</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📍 Pinpoints</h3>
      <p>Clique no modelo 3D para adicionar</p>
    </div>
    <div class="pin-list" id="pinList">
      <!-- pins appear here -->
    </div>
    <div class="sidebar-footer">
      <div class="pin-count" id="pinCount">0 pinpoints</div>
    </div>
  </div>

  <!-- Instructions -->
  <div class="instructions" id="instructions">
    <strong>Clique</strong> no modelo para adicionar pinpoint &nbsp;|&nbsp;
    <strong>LMB</strong> Rotacionar &nbsp;|&nbsp;
    <strong>RMB</strong> Mover &nbsp;|&nbsp;
    <strong>Scroll</strong> Zoom
  </div>

  <!-- JSON Modal -->
  <div class="json-modal" id="jsonModal">
    <div class="json-content">
      <h3>📋 JSON dos Pinpoints</h3>
      <textarea id="jsonOutput" readonly></textarea>
      <div class="json-actions">
        <button class="btn-action" onclick="closeModal()">Fechar</button>
        <button class="btn-action primary" onclick="copyJSON()">Copiar</button>
      </div>
    </div>
  </div>

  <!-- Three.js (local) -->
  <script type="importmap">
    {
      "imports": {
        "three": "./lib/three/three.module.js",
        "three/addons/controls/OrbitControls.js": "./lib/three/OrbitControls.js",
        "three/addons/loaders/GLTFLoader.js": "./lib/three/GLTFLoader.js",
        "three/addons/loaders/DRACOLoader.js": "./lib/three/DRACOLoader.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    // ── State ──
    const pins = [];
    let loadedModel = null;

    // ── Scene ──
    const viewport = document.getElementById('viewport');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1117);

    const camera = new THREE.PerspectiveCamera(
      50, viewport.clientWidth / viewport.clientHeight, 0.1, 1000
    );
    camera.position.set(15, 12, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(viewport.clientWidth, viewport.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    viewport.appendChild(renderer.domElement);

    // ── Lighting ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const keyLight = new THREE.DirectionalLight(0xfff4e6, 1.2);
    keyLight.position.set(10, 20, 10);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xc4d4f7, 0.5);
    fillLight.position.set(-10, 10, -10);
    scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0x1ca745, 0.3);
    rimLight.position.set(0, 5, -15);
    scene.add(rimLight);

    // ── Controls ──
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // ── Raycaster ──
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // ── Load Model ──
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('./lib/draco/');
    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingProgress = document.getElementById('loadingProgress');

    loader.load(
      '../reconstruction/melhorresultado_otimizado.glb',
      (gltf) => {
        loadedModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(loadedModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        loadedModel.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 15 / maxDim;
        loadedModel.scale.setScalar(scale);

        scene.add(loadedModel);

        const finalBox = new THREE.Box3().setFromObject(loadedModel);
        const finalCenter = finalBox.getCenter(new THREE.Vector3());
        const finalSize = finalBox.getSize(new THREE.Vector3());
        const dist = finalSize.length() * 0.7;

        camera.position.set(
          finalCenter.x - dist * 0.7,
          finalCenter.y + dist * 0.5,
          finalCenter.z - dist * 0.7
        );
        controls.target.copy(finalCenter);
        controls.update();

        loadingOverlay.classList.add('hidden');
        setTimeout(() => { loadingOverlay.style.display = 'none'; }, 600);
      },
      (xhr) => {
        if (xhr.lengthComputable) {
          loadingProgress.textContent = Math.round((xhr.loaded / xhr.total) * 100) + '%';
        }
      },
      (error) => {
        console.error('Erro:', error);
        document.querySelector('.loading-text').textContent = 'Erro ao carregar modelo.';
      }
    );

    // ── Create Pin Mesh ──
    function createPinMesh(position) {
      const group = new THREE.Group();

      // Sphere head
      const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
      const sphereMat = new THREE.MeshStandardMaterial({
        color: 0x1ca745,
        emissive: 0x1ca745,
        emissiveIntensity: 0.5,
        metalness: 0.3,
        roughness: 0.4,
      });
      const sphere = new THREE.Mesh(sphereGeo, sphereMat);
      sphere.position.y = 0.5;
      group.add(sphere);

      // Stem
      const stemGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 8);
      const stemMat = new THREE.MeshStandardMaterial({ color: 0x1ca745 });
      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.y = 0.25;
      group.add(stem);

      // Glow ring
      const ringGeo = new THREE.RingGeometry(0.2, 0.35, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x1ca745,
        transparent: true,
        opacity: 0.25,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.01;
      group.add(ring);

      group.position.copy(position);
      return group;
    }

    // ── Click Handler ──
    viewport.addEventListener('click', (event) => {
      if (!loadedModel) return;

      const rect = viewport.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(loadedModel, true);

      if (intersects.length > 0) {
        const point = intersects[0].point.clone();
        const pinMesh = createPinMesh(point);
        scene.add(pinMesh);

        const pinData = {
          id: Date.now(),
          name: '',
          position: { x: point.x, y: point.y, z: point.z },
          mesh: pinMesh,
        };
        pins.push(pinData);
        renderPinList();
      }
    });

    // ── Render Pin List ──
    function renderPinList() {
      const list = document.getElementById('pinList');
      list.innerHTML = '';

      pins.forEach((pin, i) => {
        const el = document.createElement('div');
        el.className = 'pin-item';
        el.style.flexWrap = 'wrap';
        
        const hasCamera = pin.camera ? '✅ Câmera' : '📷 Salvar Câmera';
        const camClass = pin.camera ? 'primary' : '';

        el.innerHTML = `
          <div class="pin-marker"></div>
          <div class="pin-info">
            <input class="pin-name" type="text" placeholder="Estacionamento ${i + 1}"
                   value="${pin.name}" data-id="${pin.id}" />
            <div class="pin-coords">
              x: ${pin.position.x.toFixed(2)}
              y: ${pin.position.y.toFixed(2)}
              z: ${pin.position.z.toFixed(2)}
            </div>
          </div>
          <button class="pin-delete" data-id="${pin.id}" title="Remover">&times;</button>
          <div style="width: 100%; margin-top: 5px; display: flex; justify-content: flex-end;">
            <button class="btn-action ${camClass} btn-camera" style="font-size: 0.65rem; padding: 0.2rem 0.5rem;" data-id="${pin.id}">${hasCamera}</button>
          </div>
        `;
        list.appendChild(el);
      });

      // Bind events
      list.querySelectorAll('.pin-name').forEach(input => {
        input.addEventListener('input', (e) => {
          const pin = pins.find(p => p.id === Number(e.target.dataset.id));
          if (pin) pin.name = e.target.value;
        });
      });

      list.querySelectorAll('.pin-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = Number(e.target.dataset.id);
          const idx = pins.findIndex(p => p.id === id);
          if (idx !== -1) {
            scene.remove(pins[idx].mesh);
            pins.splice(idx, 1);
            renderPinList();
          }
        });
      });

      list.querySelectorAll('.btn-camera').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = Number(e.target.dataset.id);
          const pin = pins.find(p => p.id === id);
          if (pin) {
            pin.camera = {
              position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
              target: { x: controls.target.x, y: controls.target.y, z: controls.target.z }
            };
            renderPinList();
          }
        });
      });

      document.getElementById('pinCount').textContent =
        `${pins.length} pinpoint${pins.length !== 1 ? 's' : ''}`;
    }

    // ── Export / Import / Clear ──
    window.exportJSON = function () {
      const data = pins.map((p, i) => {
        const out = {
          name: p.name || `Estacionamento ${i + 1}`,
          position: {
            x: parseFloat(p.position.x.toFixed(4)),
            y: parseFloat(p.position.y.toFixed(4)),
            z: parseFloat(p.position.z.toFixed(4)),
          }
        };
        if (p.camera) {
          out.camera = {
            position: {
              x: parseFloat(p.camera.position.x.toFixed(4)),
              y: parseFloat(p.camera.position.y.toFixed(4)),
              z: parseFloat(p.camera.position.z.toFixed(4))
            },
            target: {
              x: parseFloat(p.camera.target.x.toFixed(4)),
              y: parseFloat(p.camera.target.y.toFixed(4)),
              z: parseFloat(p.camera.target.z.toFixed(4))
            }
          };
        }
        return out;
      });
      const jsonStr = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'config.json';
      a.click();
      URL.revokeObjectURL(url);
    };

    window.importJSON = function () {
      const input = prompt('Cole o JSON dos pinpoints aqui:');
      if (!input) return;
      try {
        const data = JSON.parse(input);
        // Clear existing
        pins.forEach(p => scene.remove(p.mesh));
        pins.length = 0;

        data.forEach(item => {
          const pos = new THREE.Vector3(item.position.x, item.position.y, item.position.z);
          const pinMesh = createPinMesh(pos);
          scene.add(pinMesh);
          pins.push({
            id: Date.now() + Math.random(),
            name: item.name || '',
            position: { x: pos.x, y: pos.y, z: pos.z },
            camera: item.camera || null,
            mesh: pinMesh,
          });
        });
        renderPinList();
      } catch (e) {
        alert('JSON inválido: ' + e.message);
      }
    };

    function loadConfig() {
      fetch('config.json')
        .then(res => {
          if (!res.ok) throw new Error('config.json not found');
          return res.json();
        })
        .then(data => {
          data.forEach(item => {
            const pos = new THREE.Vector3(item.position.x, item.position.y, item.position.z);
            const pinMesh = createPinMesh(pos);
            scene.add(pinMesh);
            pins.push({
              id: Date.now() + Math.random(),
              name: item.name || '',
              position: { x: pos.x, y: pos.y, z: pos.z },
              camera: item.camera || null,
              mesh: pinMesh,
            });
          });
          renderPinList();
        })
        .catch(err => console.log('Nenhum config.json encontrado ou erro ao carregar:', err));
    }
    loadConfig();

    window.clearAllPins = function () {
      if (pins.length === 0) return;
      if (!confirm(`Remover ${pins.length} pinpoint(s)?`)) return;
      pins.forEach(p => scene.remove(p.mesh));
      pins.length = 0;
      renderPinList();
    };

    window.copyJSON = function () {
      const textarea = document.getElementById('jsonOutput');
      textarea.select();
      navigator.clipboard.writeText(textarea.value);
      const btn = event.target;
      btn.textContent = 'Copiado!';
      setTimeout(() => { btn.textContent = 'Copiar'; }, 1500);
    };

    window.closeModal = function () {
      document.getElementById('jsonModal').classList.remove('active');
    };

    // ── Animation Loop ──
    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      // Animate pin glow
      const t = Date.now() * 0.003;
      pins.forEach(pin => {
        const ring = pin.mesh.children[2];
        if (ring && ring.material) {
          ring.material.opacity = 0.15 + Math.sin(t) * 0.1;
        }
      });

      renderer.render(scene, camera);
    }
    animate();

    // ── Resize ──
    window.addEventListener('resize', () => {
      const w = viewport.clientWidth;
      const h = viewport.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
</body>

</html>
