<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapeamento de Vagas — Estaciona AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary-green: #1ca745;
      --font-main: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: #0f1117;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
    }

    .cal-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      background: rgba(15, 17, 23, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 100;
    }

    .cal-nav .title {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cal-nav .title .dot {
      width: 8px; height: 8px;
      background: var(--primary-green);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      font-family: var(--font-main);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #94a3b8;
    }

    .btn-action:hover {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
    }

    .btn-action.primary {
      background: var(--primary-green);
      border-color: var(--primary-green);
      color: #fff;
    }

    .btn-action.primary:hover {
      background: #158a36;
    }

    .main-layout {
      position: fixed;
      top: 48px; left: 0; right: 300px; bottom: 0;
      background: #0a0c10;
      overflow: hidden;
      cursor: crosshair;
    }

    #orthoCanvas {
      position: absolute;
      top: 0; left: 0;
    }

    .sidebar {
      position: fixed;
      top: 48px; right: 0; bottom: 0;
      width: 300px;
      background: rgba(15, 17, 23, 0.95);
      border-left: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      z-index: 90;
    }

    .sidebar-header {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-header h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 0.25rem;
    }

    .sidebar-header p {
      font-size: 0.72rem;
      color: #64748b;
      margin: 0;
    }

    .spot-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .spot-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      margin-bottom: 0.35rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      transition: all 0.2s;
    }

    .spot-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .spot-id {
      font-size: 0.85rem;
      font-weight: 700;
      color: #e2e8f0;
      flex: 1;
    }

    .spot-pts {
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      line-height: 1;
      transition: color 0.2s;
    }

    .btn-delete:hover {
      color: #f87171;
    }

    .sidebar-footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .instructions {
      position: fixed;
      bottom: 0.75rem;
      left: 0.75rem;
      background: rgba(15, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      z-index: 60;
      font-size: 0.75rem;
      color: #64748b;
      pointer-events: none;
    }

    .instructions strong { color: #94a3b8; }
    .instructions kbd {
      background: rgba(255,255,255,0.1);
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
      color: #e2e8f0;
      font-family: monospace;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: #0f1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.5rem;
      width: 300px;
    }
    .modal h3 { font-size: 1rem; margin-bottom: 1rem; color: #e2e8f0; }
    .modal input {
      width: 100%;
      padding: 0.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: white;
      font-family: var(--font-main);
      margin-bottom: 1rem;
    }
    .modal .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  </style>
</head>

<body>
  <nav class="cal-nav">
    <div class="title">
      <div class="dot"></div>
      Mapeamento de Vagas (Spots)
    </div>
    <div class="nav-actions">
      <button class="btn-action" onclick="undoPoint()" id="btnUndo" disabled>Desfazer Ponto (Z)</button>
      <button class="btn-action primary" onclick="exportSpots()">Exportar spots_3d.json</button>
    </div>
  </nav>

  <div class="main-layout" id="mainLayout">
    <canvas id="orthoCanvas"></canvas>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🚗 Vagas Mapeadas</h3>
      <p id="calibrationStatus">Aguardando calibração...</p>
    </div>
    <div class="spot-list" id="spotList"></div>
    <div class="sidebar-footer">
      <button class="btn-action primary" style="width: 100%; text-align: center;" onclick="exportSpots()">Exportar JSON</button>
    </div>
  </div>

  <div class="instructions">
    <strong>LMB</strong> Adicionar ponto do polígono &nbsp;|&nbsp;
    <strong>C</strong> Fechar Polígono &nbsp;|&nbsp;
    <strong>Scroll</strong> Zoom &nbsp;|&nbsp;
    <strong>RMB</strong> Arrastar mapa
  </div>

  <div class="modal-overlay" id="idModal">
    <div class="modal">
      <h3>Identificador da Vaga</h3>
      <input type="text" id="spotIdInput" placeholder="Ex: A-01" autocomplete="off">
      <div class="modal-actions">
        <button class="btn-action" onclick="cancelSpot()">Cancelar</button>
        <button class="btn-action primary" onclick="confirmSpot()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('orthoCanvas');
    const ctx = canvas.getContext('2d');
    const layout = document.getElementById('mainLayout');
    
    let orthoImg = new Image();
    let imgScale = 1;
    let imgOffX = 0;
    let imgOffY = 0;
    
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;

    let spots = []; // Array de vagas concluídas
    let currentPolygon = []; // Polígono atual sendo desenhado
    let calibrationTransform = null; // matrix {a,b,c,d,tx,ty}

    // ── Loader ──
    async function init() {
      try {
        const res = await fetch('data/ortho_calibration.json');
        if (!res.ok) throw new Error('Falha ao carregar ortho_calibration.json');
        const calData = await res.json();
        calibrationTransform = calData.transform.imageToModel;
        document.getElementById('calibrationStatus').textContent = "Calibração: Ativa (imageToModel)";
        document.getElementById('calibrationStatus').style.color = "#22c55e";
        
        orthoImg.src = 'assets/images/' + (calData.image ? calData.image.split('/').pop() : 'uniube_ortho_projection.png');
        orthoImg.onload = () => {
          fitImage();
          draw();
        };
      } catch (err) {
        console.error(err);
        document.getElementById('calibrationStatus').textContent = "Erro: " + err.message;
        document.getElementById('calibrationStatus').style.color = "#f87171";
      }
    }

    function fitImage() {
      const w = layout.clientWidth;
      const h = layout.clientHeight;
      canvas.width = w;
      canvas.height = h;

      if (!orthoImg.complete || orthoImg.naturalWidth === 0) return;

      const scaleX = w / orthoImg.width;
      const scaleY = h / orthoImg.height;
      imgScale = Math.min(scaleX, scaleY) * 0.95;
      imgOffX = (w - orthoImg.width * imgScale) / 2;
      imgOffY = (h - orthoImg.height * imgScale) / 2;
    }

    function applyTransform(pt, t) {
      return {
        x: t.a * pt.x + t.b * pt.y + t.tx,
        z: t.c * pt.x + t.d * pt.y + t.ty
      };
    }

    function calcCenter(pts) {
      if(pts.length === 0) return {x:0, y:0};
      let x = 0, y = 0;
      for(let p of pts) { x += p.x; y += p.y; }
      return { x: x/pts.length, y: y/pts.length };
    }

    // ── Drawing ──
    function draw() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      
      if (orthoImg.complete && orthoImg.naturalWidth > 0) {
        ctx.drawImage(
          orthoImg,
          imgOffX, imgOffY,
          orthoImg.width * imgScale,
          orthoImg.height * imgScale
        );
      }

      // Vagas concluídas
      spots.forEach(spot => {
        if (spot.pixels.length === 0) return;
        ctx.beginPath();
        const first = spot.pixels[0];
        ctx.moveTo(imgOffX + first.x * imgScale, imgOffY + first.y * imgScale);
        for(let i=1; i<spot.pixels.length; i++) {
          const pt = spot.pixels[i];
          ctx.lineTo(imgOffX + pt.x * imgScale, imgOffY + pt.y * imgScale);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(28, 167, 69, 0.3)";
        ctx.fill();
        ctx.strokeStyle = "#1ca745";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Id text
        const center = calcCenter(spot.pixels);
        const cx = imgOffX + center.x * imgScale;
        const cy = imgOffY + center.y * imgScale;
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px Outfit";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        // text outline
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        ctx.strokeText(spot.id, cx, cy);
        ctx.fillText(spot.id, cx, cy);
      });

      // Polígono atual
      if (currentPolygon.length > 0) {
        ctx.beginPath();
        const first = currentPolygon[0];
        ctx.moveTo(imgOffX + first.x * imgScale, imgOffY + first.y * imgScale);
        for(let i=1; i<currentPolygon.length; i++) {
          const pt = currentPolygon[i];
          ctx.lineTo(imgOffX + pt.x * imgScale, imgOffY + pt.y * imgScale);
        }
        ctx.strokeStyle = "#f59e0b";
        ctx.lineWidth = 2;
        ctx.stroke();

        currentPolygon.forEach(pt => {
          ctx.beginPath();
          ctx.arc(imgOffX + pt.x * imgScale, imgOffY + pt.y * imgScale, 4, 0, Math.PI*2);
          ctx.fillStyle = "#f59e0b";
          ctx.fill();
        });
      }
    }

    // ── Interaction ──
    layout.addEventListener('mousedown', e => {
      if (e.button === 2 || e.button === 1) {
        isDragging = true;
        dragStartX = e.clientX - imgOffX;
        dragStartY = e.clientY - imgOffY;
        layout.style.cursor = 'grabbing';
      }
    });

    layout.addEventListener('mousemove', e => {
      if (isDragging) {
        imgOffX = e.clientX - dragStartX;
        imgOffY = e.clientY - dragStartY;
        draw();
      }
    });

    window.addEventListener('mouseup', e => {
      if (isDragging) {
        isDragging = false;
        layout.style.cursor = 'crosshair';
      }
    });

    layout.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const oldScale = imgScale;
      const factor = e.deltaY < 0 ? 1.1 : 0.9;
      imgScale *= factor;
      imgScale = Math.max(0.05, Math.min(imgScale, 10));

      imgOffX = mx - (mx - imgOffX) * (imgScale / oldScale);
      imgOffY = my - (my - imgOffY) * (imgScale / oldScale);

      draw();
    });

    layout.addEventListener('contextmenu', e => e.preventDefault());

    layout.addEventListener('click', e => {
      if (isDragging) return; // avoid click on drag end
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const px = (mx - imgOffX) / imgScale;
      const py = (my - imgOffY) / imgScale;

      currentPolygon.push({ x: px, y: py });
      document.getElementById('btnUndo').disabled = false;
      draw();
    });

    window.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'z') {
        undoPoint();
      }
      if (e.key.toLowerCase() === 'c' && currentPolygon.length >= 3) {
        finishPolygon();
      }
    });

    function undoPoint() {
      if (currentPolygon.length > 0) {
        currentPolygon.pop();
        if (currentPolygon.length === 0) document.getElementById('btnUndo').disabled = true;
        draw();
      }
    }

    function finishPolygon() {
      if (currentPolygon.length < 3) return;
      document.getElementById('idModal').classList.add('active');
      const input = document.getElementById('spotIdInput');
      input.value = '';
      input.focus();
    }

    function cancelSpot() {
      document.getElementById('idModal').classList.remove('active');
    }

    function confirmSpot() {
      const id = document.getElementById('spotIdInput').value.trim();
      if (!id) return;

      spots.push({
        id: id,
        pixels: [...currentPolygon]
      });

      currentPolygon = [];
      document.getElementById('btnUndo').disabled = true;
      document.getElementById('idModal').classList.remove('active');
      draw();
      renderSidebar();
    }

    document.getElementById('spotIdInput').addEventListener('keyup', e => {
      if (e.key === 'Enter') confirmSpot();
      if (e.key === 'Escape') cancelSpot();
    });

    // ── Sidebar ──
    function renderSidebar() {
      const list = document.getElementById('spotList');
      list.innerHTML = '';
      
      spots.forEach((spot, idx) => {
        const div = document.createElement('div');
        div.className = 'spot-item';
        div.innerHTML = `
          <div class="spot-row">
            <span class="spot-id">${spot.id}</span>
            <span class="spot-pts">${spot.pixels.length} pts</span>
            <button class="btn-delete" title="Remover" onclick="deleteSpot(${idx})">&times;</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    window.deleteSpot = function(idx) {
      spots.splice(idx, 1);
      renderSidebar();
      draw();
    }

    window.addEventListener('resize', () => {
      fitImage();
      draw();
    });

    // ── Export ──
    window.exportSpots = function() {
      if (!calibrationTransform) {
        alert("A calibração não está carregada.");
        return;
      }
      
      const exported = [];

      spots.forEach(spot => {
        const centerPx = calcCenter(spot.pixels);
        const center3D = applyTransform(centerPx, calibrationTransform);
        
        const polygon3D = spot.pixels.map(pt => applyTransform(pt, calibrationTransform));

        exported.push({
          id: spot.id,
          center3D: { x: parseFloat(center3D.x.toFixed(4)), y: 0, z: parseFloat(center3D.z.toFixed(4)) },
          polygon3D: polygon3D.map(p => ({ x: parseFloat(p.x.toFixed(4)), y: 0, z: parseFloat(p.z.toFixed(4)) })),
          polygonPixels: spot.pixels.map(p => ({ x: parseFloat(p.x.toFixed(2)), y: parseFloat(p.y.toFixed(2)) }))
        });
      });

      const jsonStr = JSON.stringify(exported, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'spots_3d.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    init();
  </script>
</body>

</html>
